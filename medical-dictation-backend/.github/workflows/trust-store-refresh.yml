name: trust-store-refresh

on:
  schedule:
    - cron: "0 7 * * 1"   # Monday 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssl jq python3-defusedxml
      - name: Run refresh
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_SECURITY_WEBHOOK }}
        run: bash scripts/update-trust-store.sh
