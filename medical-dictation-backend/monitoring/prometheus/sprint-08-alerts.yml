groups:
  - name: sprint-08-reports
    interval: 1m
    rules:
      - alert: ReportAutosaveConflictRateHigh
        expr: |
          (sum(rate(mdx_reports_autosave_conflicts_total[10m]))
           / clamp_min(sum(rate(mdx_reports_diff_cache_lookups_total[10m])), 1))
          > 0.05
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Autosave conflict rate > 5% — likely FE/BE protocol drift"
          runbook: "docs/runbooks/reports.md#high-autosave-conflict-rate"

      - alert: ReportSearchLatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum(rate(mdx_reports_search_latency_ms_histogram_bucket[5m])) by (le))
          > 500
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "Search p95 above 500ms — investigate FTS index health"
          runbook: "docs/runbooks/reports.md#search-performance-issue"

      - alert: ReportChainIntegrityFailure
        expr: increase(mdx_reports_chain_integrity_check_failures_total[1h]) > 0
        for: 5m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "Amendment chain integrity anomaly detected — page security lead"
          runbook: "docs/runbooks/reports.md#version-chain-break"

      - alert: ReportIdleDraftArchiveSpike
        expr: increase(mdx_reports_idle_draft_archived_total[1d]) > 1000
        for: 15m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "More than 1000 idle drafts archived in 24h — FE may be losing drafts"
