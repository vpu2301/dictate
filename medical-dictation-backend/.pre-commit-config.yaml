# Pre-commit hooks: local-fast feedback before CI.
# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run -a

repos:
  # Pin MUST track the ruff the project/CI run (uv resolves 0.15.x). A stale
  # pin enforces a different (older) rule set than `make lint` — e.g. v0.4.x
  # still flagged UP038/E402 that current ruff dropped — so the hook and CI
  # disagree. Bump this in lockstep with the project ruff.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.27.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      # mypy as a LOCAL hook (not the mirror): it must run in the project venv
      # so the real third-party deps (opentelemetry, …) are importable. The
      # isolated mirror env sees those imports as Any under ignore_missing_imports
      # and then flags every real `type: ignore` as unused. This mirrors the
      # `make typecheck` subset exactly. pass_filenames: false → mypy checks the
      # packages, not isolated files (isolated files spuriously report unused
      # ignores under --strict).
      - id: mypy-foundation
        name: mypy --strict (secret + observability)
        entry: bash -c 'cd medical-dictation-backend && uv run --with "mypy>=1.10" mypy --strict libs/secret/src libs/observability/src'
        language: system
        pass_filenames: false
        files: (^|/)libs/(secret|observability)/src/.*\.py$

      - id: no-os-environ-in-services
        name: Reject os.environ outside config.py
        description: All envvar reads go through pydantic-settings in config.py.
        # language: system + `python3 <path>` — the scripts are stdlib-only and
        # NOT installed as console entry points, so `language: python` looked
        # for a non-existent executable. Hooks run from the git toplevel (the
        # thin wrapper above medical-dictation-backend/), so both the entry path
        # and the file args carry that prefix; the script self-excludes the
        # sanctioned surfaces, and the un-anchored exclude regex (re.search)
        # just trims the file list for speed regardless of the prefix.
        entry: python3 medical-dictation-backend/scripts/dev/check-no-os-environ.py
        language: system
        types: [python]
        exclude: (^|/)config\.py$|(^|/)(tests|scripts)/|(^|/)libs/secret/

      - id: no-direct-asyncpg
        name: Reject direct asyncpg.connect outside libs/db/
        description: Use libs/db.tenant_connection() — see ADR-0004.
        entry: python3 medical-dictation-backend/scripts/dev/check-no-direct-asyncpg.py
        language: system
        types: [python]
        exclude: (^|/)libs/db/|(^|/)(tests|scripts)/
