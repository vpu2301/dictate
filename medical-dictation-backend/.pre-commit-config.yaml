# Pre-commit hooks: local-fast feedback before CI.
# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run -a

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        # Fast subset — full --strict runs in CI. We only check the secret
        # and observability libs locally because they are small and security-critical.
        files: ^libs/(secret|observability)/src/
        additional_dependencies:
          - pydantic>=2.7.0

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.27.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: no-os-environ-in-services
        name: Reject os.environ outside config.py
        description: All envvar reads go through pydantic-settings in config.py.
        entry: scripts/dev/check-no-os-environ.py
        language: python
        types: [python]
        exclude: ^(.*/config\.py|tests/|libs/secret/|scripts/)

      - id: no-direct-asyncpg
        name: Reject direct asyncpg.connect outside libs/db/
        description: Use libs/db.tenant_connection() — see ADR-0004.
        entry: scripts/dev/check-no-direct-asyncpg.py
        language: python
        types: [python]
        exclude: ^libs/db/
