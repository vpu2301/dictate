global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  # Add per-service scrape configs as services are created:
  # - job_name: template-service
  #   static_configs:
  #     - targets: ['template-service:8000']
  #   metrics_path: /metrics
