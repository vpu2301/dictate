# Sprint-02 alert rules — auth / audit.
#
# Mount this file in Prometheus and reference from prometheus.yml under
# `rule_files:`. The accompanying Grafana dashboard
# (infra/grafana/dashboards/sprint-02-auth-audit.json) consumes the same
# metrics for the visual panels.
#
# Severity convention:
#   - `critical` pages the on-call security lead immediately.
#   - `warning`  posts to #sec-alerts (handled within the next business day).

groups:
  - name: sprint-02-auth
    interval: 30s
    rules:
      # ── Brute-force / credential-stuffing signal ─────────────────────
      - alert: LoginFailureBurst
        expr: sum(rate(mdx_auth_login_total{result!="success"}[1m])) > 5
        for: 1m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "Login failures exceed 5/s for 1 minute"
          runbook: "docs/runbooks/auth.md#login-failure-burst"
          description: |
            Total login failure rate (rate over 1m, by failure kind) has
            been above 5/s for the alert window. Likely brute-force or
            credential stuffing. Keycloak's per-account lockout kicks in
            at 5 failures within 60s; this fires when the *aggregate*
            rate stays elevated. Investigate source IPs and consider
            adding a network-level block.

      # ── Refresh-token replay is *never* expected ────────────────────
      - alert: RefreshReplayDetected
        expr: increase(mdx_auth_refresh_replay_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "Replay of a previously-used refresh token detected"
          runbook: "docs/runbooks/auth.md#refresh-replay"
          description: |
            One or more refresh-token-rotation replays have been observed
            in the last 5 minutes. Refresh tokens are rotated on every
            use; a replay means an old token was presented after rotation
            — either token theft or a buggy client. The handler has
            already force-revoked sessions; review the audit row
            (kind=auth.refresh_replay_detected, severity=sec) for
            tenant + user context.

      # ── JWKS cache hit-ratio: caching IS the perf budget ────────────
      - alert: JwksCacheHitRatioLow
        expr: |
          (
            sum(rate(mdx_jwks_cache_hits_total[5m]))
            / clamp_min(
                sum(rate(mdx_jwks_cache_hits_total[5m]))
                + sum(rate(mdx_jwks_cache_misses_total[5m])),
              1)
          ) < 0.95
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "JWKS cache hit ratio < 95% for 5 minutes"
          description: |
            libs/auth's JwksCache hit ratio has dropped below 95% for the
            alert window. Causes: Keycloak rotating signing keys faster
            than the TTL, an unusual number of tokens with unrecognised
            kids (forged?), or a bug in cache invalidation. Inspect
            ``mdx_jwks_refresh_attempts_total`` and the dev cluster's
            Keycloak signing-key history.

  - name: sprint-02-audit
    interval: 30s
    rules:
      # ── Tamper-evident chain ────────────────────────────────────────
      - alert: AuditChainBroken
        # The nightly verify job writes one row per tenant. Min == 0 means
        # at least one tenant's chain diverged.
        expr: min(mdx_audit_chain_ok) == 0
        for: 0m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "Audit chain divergence detected by nightly verify"
          runbook: "docs/runbooks/auth.md#chain-divergence"
          description: |
            The nightly chain-verification job (scripts/jobs/nightly_verify.py)
            reported a hash divergence. Page security lead. Do NOT
            attempt remediation before the postgres logs + the audit row
            ``audit.chain_verified`` (which itself is on the chain) are
            preserved for forensics.

      # ── Verify hasn't run lately — silent failure of the cron ───────
      - alert: AuditChainVerifyStale
        expr: time() - max(mdx_audit_chain_last_verify_ts) > 28800  # 8h
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Audit chain verifier hasn't reported in 8h"
          description: |
            The nightly verify job is supposed to run at 02:00 UTC.
            If the gauge timestamp is older than 8h the job is failing
            silently — check the cron driver and the audit_reader DSN.

      # ── Write latency budget ───────────────────────────────────────
      - alert: AuditWriteSlow
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(mdx_audit_write_duration_seconds_bucket[5m]))
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "AuditWriter p95 > 100ms for 5 minutes"
          description: |
            Either DB latency spiked, advisory-lock contention is climbing
            (a per-tenant hot key), or JCS canonicalisation is slow on a
            pathological payload. Check pg_stat_activity for blocked
            audit-writer transactions.
