# HF Space nginx — single port (7860), routes by path to internal services.

server {
    listen 7860 default_server;
    server_name _;

    root /opt/frontend;
    index index.html;

    location = / {
        return 200 '{"service":"medical-dictation-demo","banner":"DEMO MODE — Do not enter real patient information","login_at":"/auth/login"}';
        add_header Content-Type application/json;
    }

    location = /_health {
        proxy_pass http://127.0.0.1:8000/healthz;
        proxy_read_timeout 5s;
    }

    # Keycloak realm endpoints (login flow, JWKS, etc.).
    location /auth/realms/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # auth-service surfaces /auth/login + /auth/refresh + /auth/logout + /auth/me.
    location /auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /asr/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 110m;
    }

    location /templates/ {
        proxy_pass http://127.0.0.1:8006;
        proxy_set_header Host $host;
    }

    location /nlp/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
    }

    location /dictate/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
    }
    location /ws/dictate {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
